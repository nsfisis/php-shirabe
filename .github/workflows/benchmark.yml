name: Benchmark

on:
  pull_request:
  push:
    branches: [main]

jobs:
  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: Swatinem/rust-cache@v2

      - name: Install PHP and Composer
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          # TODO(phase-c): imagick disabled because PlatformRepository's ext-imagick
          # version probe (crates/shirabe/src/repository/platform_repository.rs) calls
          # Runtime::construct -> shirabe_php_shim::instantiate_class, which is
          # todo!() (crates/shirabe-php-shim/src/var.rs). Constructing PHP objects
          # over php-rpc is out of scope for now (docs/dev/php-rpc.md). Once that's
          # implemented, drop this and let the benchmark run against a stock PHP setup.
          extensions: "-imagick"
          tools: composer

      - name: Install hyperfine
        run: sudo apt-get update && sudo apt-get install -y hyperfine

      - name: Install composer submodule dependencies
        working-directory: composer
        run: composer install --no-dev --no-interaction --no-progress

      - name: Run require benchmark
        run: bash scripts/bench/require.sh

      - name: Run create-project benchmark
        run: bash scripts/bench/create-project.sh

      - name: Publish benchmark summary
        if: always()
        run: |
          {
            echo '## require (monolog/monolog)'
            cat "$(ls -t "${TMPDIR:-/tmp}"/shirabe-bench-require-*/results-*.md | head -n1)"
            echo
            echo '## create-project (laravel/laravel)'
            cat "$(ls -t "${TMPDIR:-/tmp}"/shirabe-bench-create-project-*/results-*.md | head -n1)"
          } >> "$GITHUB_STEP_SUMMARY"
